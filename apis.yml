aid: riverside
name: Riverside
description: >-
  Riverside is a professional podcast and video recording platform that
  enables remote studio-quality recording, AI-powered editing, and publishing.
  The Riverside Business API provides programmatic access to recordings,
  productions, studios, projects, exports, transcriptions, and webinar
  management for enterprise podcast production workflows. API access is
  available on Business plan only.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Podcast
  - Video Recording
  - Media
  - Content Creation
  - Audio
url: >-
  https://raw.githubusercontent.com/api-evangelist/riverside/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-05-02'
specificationVersion: '0.19'
apis:
  - aid: riverside:riverside-business-api
    name: Riverside Business API
    description: >-
      The Riverside Business API provides access to recording management,
      production workflows, studio and project organization, file downloads,
      transcription retrieval, export management, and webinar registration.
      Authentication uses API key bearer tokens available on Business plan.
      Base URL is https://platform.riverside.fm with v2 and v3 versioned paths.
    humanURL: https://docs.riverside.fm/
    baseURL: https://platform.riverside.fm
    tags:
      - Podcast
      - Recording
      - Media
      - Video
      - Audio
      - Transcription
